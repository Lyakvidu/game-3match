<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#1c1330">
  <meta name="color-scheme" content="dark">
  <meta name="description" content="Кристалл Краш — мобильная игра три в ряд для VK Mini Apps.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Кристалл Краш">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css?v=2">
  <title>Кристалл Краш — три в ряд</title>
</head>
<body>
  <div id="app">
    <section id="screen-loading" class="screen active" aria-live="polite">
      <div class="loader-gem" aria-hidden="true"></div>
      <div class="loader-text">Загружаем кристаллы…</div>
      <button id="loading-retry" class="btn btn-secondary loading-retry" type="button" hidden>Попробовать снова</button>
    </section>

    <section id="screen-menu" class="screen menu-screen" aria-labelledby="game-title">
      <div class="menu-glow" aria-hidden="true"></div>
      <main class="menu-content">
        <div class="logo-gem" aria-hidden="true">💎</div>
        <h1 id="game-title" class="game-title">Кристалл Краш</h1>
        <p class="game-subtitle">Собирай комбинации, открывай уровни и зажигай звёзды!</p>

        <div class="menu-stats" aria-label="Прогресс">
          <span><b id="menu-stars">0</b> ⭐</span>
          <span><b id="menu-level">1</b> уровень</span>
        </div>

        <div class="menu-actions">
          <button id="btn-play" class="btn btn-primary btn-large" type="button">Играть</button>
          <button id="btn-levels" class="btn btn-secondary" type="button">Выбрать уровень</button>
          <button id="btn-settings" class="btn btn-secondary" type="button">Настройки</button>
          <button id="btn-share" class="btn btn-ghost" type="button">Поделиться игрой</button>
        </div>
      </main>
      <footer class="legal-links">
        <a href="privacy-policy.html" target="_blank" rel="noopener">Конфиденциальность</a>
        <a href="support.html" target="_blank" rel="noopener">Поддержка</a>
      </footer>
    </section>

    <section id="screen-levels" class="screen" aria-labelledby="levels-title">
      <header class="topbar">
        <button id="levels-back" class="icon-btn" type="button" aria-label="Вернуться в меню">←</button>
        <h2 id="levels-title" class="topbar-title">Уровни</h2>
        <div id="total-stars-wrap" aria-label="Всего звёзд">
          <span class="star-icon" aria-hidden="true">★</span>
          <span id="total-stars">0</span>
        </div>
      </header>
      <div class="levels-scroll">
        <div id="levels-grid" class="levels-grid"></div>
      </div>
    </section>

    <section id="screen-game" class="screen" aria-label="Игровое поле">
      <header class="topbar game-topbar">
        <button id="btn-back" class="icon-btn" type="button" aria-label="Вернуться к уровням">←</button>
        <div class="hud">
          <div class="hud-item">
            <div class="hud-label">Ходы</div>
            <div id="hud-moves" class="hud-value">0</div>
          </div>
          <div class="hud-item hud-goal">
            <div id="hud-level" class="hud-label">Уровень 1</div>
            <div class="hud-progress-track" aria-hidden="true">
              <div id="hud-progress-fill" class="hud-progress-fill"></div>
            </div>
            <div id="hud-score" class="hud-value">0 / 0</div>
          </div>
        </div>
        <button id="btn-restart" class="icon-btn" type="button" aria-label="Начать уровень заново">↻</button>
      </header>

      <div class="board-wrap">
        <div id="board" class="board" role="grid" aria-label="Поле с кристаллами"></div>
      </div>

      <div class="boosters" aria-label="Бустеры">
        <button id="booster-hint" class="booster-btn" type="button"><span aria-hidden="true">💡</span><span>Подсказка</span></button>
        <button id="booster-bomb" class="booster-btn" type="button" aria-label="Бомба, осталась 1"><span aria-hidden="true">💣</span><span id="bomb-count" aria-hidden="true">1</span></button>
        <button id="booster-moves" class="booster-btn booster-ad" type="button"><span aria-hidden="true">▶</span><span>+5 ходов</span></button>
      </div>
    </section>

    <section id="screen-settings" class="screen" aria-labelledby="settings-title">
      <header class="topbar">
        <button id="settings-back" class="icon-btn" type="button" aria-label="Вернуться в меню">←</button>
        <h2 id="settings-title" class="topbar-title">Настройки</h2>
      </header>
      <main class="settings-card">
        <label class="setting-row" for="setting-music">
          <span><b>Музыка</b><small>Фоновая мелодия</small></span>
          <input id="setting-music" type="checkbox" checked>
          <span class="switch" aria-hidden="true"></span>
        </label>
        <label class="setting-row" for="setting-sfx">
          <span><b>Звуки</b><small>Комбинации и победа</small></span>
          <input id="setting-sfx" type="checkbox" checked>
          <span class="switch" aria-hidden="true"></span>
        </label>
        <button id="btn-reset-progress" class="btn btn-danger" type="button">Сбросить прогресс</button>
      </main>
    </section>

    <div id="modal-win" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="win-title">
      <div class="modal-card">
        <div class="modal-icon" aria-hidden="true">🏆</div>
        <h2 id="win-title">Уровень пройден!</h2>
        <div id="win-stars" class="stars-row" aria-label="Полученные звёзды">
          <span class="big-star">★</span><span class="big-star">★</span><span class="big-star">★</span>
        </div>
        <p id="win-score-text" class="modal-sub"></p>
        <div class="modal-actions">
          <button id="win-btn-next" class="btn btn-primary" type="button">Следующий уровень</button>
          <button id="win-btn-levels" class="btn btn-secondary" type="button">К уровням</button>
        </div>
      </div>
    </div>

    <div id="modal-lose" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="lose-title">
      <div class="modal-card">
        <div class="modal-icon" aria-hidden="true">💫</div>
        <h2 id="lose-title">Ходы закончились</h2>
        <p id="lose-score-text" class="modal-sub"></p>
        <div class="modal-actions">
          <button id="lose-btn-ad" class="btn btn-ad" type="button">Посмотреть рекламу: +5 ходов</button>
          <button id="lose-btn-retry" class="btn btn-primary" type="button">Ещё раз</button>
          <button id="lose-btn-levels" class="btn btn-secondary" type="button">К уровням</button>
        </div>
      </div>
    </div>

    <div id="modal-confirm-reset" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="reset-title">
      <div class="modal-card">
        <div class="modal-icon" aria-hidden="true">⚠️</div>
        <h2 id="reset-title">Сбросить прогресс?</h2>
        <p class="modal-sub">Все открытые уровни и звёзды будут удалены.</p>
        <div class="modal-actions">
          <button id="reset-confirm" class="btn btn-danger" type="button">Сбросить</button>
          <button id="reset-cancel" class="btn btn-secondary" type="button">Отмена</button>
        </div>
      </div>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <audio id="music" src="music.mp3" preload="metadata" loop></audio>
  </div>

  <script defer src="https://unpkg.com/@vkontakte/vk-bridge@2.15.9/dist/browser.min.js"></script>
  <script defer src="app.js?v=2"></script>
</body>
</html>
